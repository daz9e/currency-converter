version: '3.8'

services:
  bot:
    build: .
    container_name: money-convert-bot
    restart: unless-stopped
    environment:
      - TELEGRAM_BOT_TOKEN=${TELEGRAM_BOT_TOKEN}
      - DEFAULT_CURRENCY=${DEFAULT_CURRENCY:-EUR}
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
